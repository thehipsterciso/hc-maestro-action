name: 'hc-maestro Threat Model Analysis'
description: >
  MAESTRO-as-Code threat modeling CI gate for agentic AI systems.
  Analyzes PR diffs against the MAESTRO threat taxonomy (L3+L4 default).
  Outputs SARIF 2.1.0 for GitHub Code Scanning and a PR review comment.
author: 'Thomas Jones (thehipsterciso)'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key for Claude inference. If omitted, requires ollama-base-url.'
    required: false
    default: ''
  ollama-base-url:
    description: 'Ollama base URL for local inference (e.g., http://localhost:11434).'
    required: false
    default: ''
  model:
    description: >
      Model to use for analysis. Examples:
        ollama/llama3.1:8b (default, requires ollama-base-url)
        ollama/qwen3:14b (requires ollama-base-url)
    required: false
    default: 'ollama/qwen3:14b'
  layers:
    description: 'Comma-separated MAESTRO layers to analyze.'
    required: false
    default: '3,4'
  severity-threshold:
    description: 'Minimum severity to include in output (critical|high|medium|low|informational).'
    required: false
    default: 'medium'
  sarif-output:
    description: 'Output path for the SARIF 2.1.0 findings file.'
    required: false
    default: 'hc-maestro-findings.sarif'
  post-pr-comment:
    description: 'Post findings as a PR review comment. Skipped if not in a PR context.'
    required: false
    default: 'true'
  fail-on-severity:
    description: >
      Fail the workflow step if any finding at or above this severity is detected.
      Set to 'none' to never fail (report-only mode).
    required: false
    default: 'high'
  spec-path:
    description: >
      Path to a custom maestro-spec.yaml. If empty, uses the bundled v0.1.0 spec.
      Use this to pin a specific spec version or provide a custom threat catalog.
    required: false
    default: ''
  upload-sarif:
    description: >
      Upload findings to GitHub Code Scanning (SARIF). Requires code scanning to be
      enabled — i.e. a public repo or GitHub Advanced Security. Set to 'false' for
      private repos without GHAS; the gate then enforces via the PR comment and
      fail-on-severity exit code instead. When 'true', a genuine upload failure
      fails the step (it is no longer silently swallowed).
    required: false
    default: 'true'

outputs:
  sarif-path:
    description: 'Absolute path to the generated SARIF file.'
    value: ${{ steps.analyze.outputs.sarif-path }}
  finding-count:
    description: 'Total number of findings at or above severity-threshold.'
    value: ${{ steps.analyze.outputs.finding-count }}
  critical-count:
    description: 'Number of critical-severity findings.'
    value: ${{ steps.analyze.outputs.critical-count }}
  high-count:
    description: 'Number of high-severity findings.'
    value: ${{ steps.analyze.outputs.high-count }}

runs:
  using: 'composite'
  steps:
    # Self-hosted runners have no GitHub-hosted tool cache. actions/setup-python
    # otherwise defaults to /Users/runner/... (or /opt/hostedtoolcache) and fails
    # with a permission error. If neither tool-cache var is set, point it at a
    # writable dir under the runner work root so setup-python works everywhere.
    - name: Prepare tool cache (self-hosted compatibility)
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${AGENT_TOOLSDIRECTORY:-}" ] && [ -z "${RUNNER_TOOL_CACHE:-}" ]; then
          base="${RUNNER_WORKSPACE:-${RUNNER_TEMP:-$PWD}}"
          tooldir="$(cd "$base/.." 2>/dev/null && pwd || echo "$base")/_tool"
          mkdir -p "$tooldir"
          echo "AGENT_TOOLSDIRECTORY=$tooldir" >> "$GITHUB_ENV"
          echo "Configured self-hosted tool cache: $tooldir"
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: pip install --quiet anthropic pyyaml jsonschema requests

    - name: Run MAESTRO threat analysis
      id: analyze
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OLLAMA_BASE_URL: ${{ inputs.ollama-base-url }}
        HC_MODEL: ${{ inputs.model }}
        HC_LAYERS: ${{ inputs.layers }}
        HC_SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        HC_SARIF_OUTPUT: ${{ inputs.sarif-output }}
        HC_POST_PR_COMMENT: ${{ inputs.post-pr-comment }}
        HC_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        HC_SPEC_PATH: ${{ inputs.spec-path }}
        GITHUB_TOKEN: ${{ github.token }}
      run: python "${{ github.action_path }}/src/main.py"

    # Conditional, not masked: upload only when requested (code scanning available).
    # No continue-on-error — when enabled, a real upload failure fails the step
    # instead of being silently swallowed.
    - name: Upload SARIF to Code Scanning
      if: ${{ inputs.upload-sarif == 'true' && steps.analyze.outputs.sarif-path != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: hc-maestro

branding:
  icon: 'shield'
  color: 'red'
